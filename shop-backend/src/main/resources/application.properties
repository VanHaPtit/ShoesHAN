spring.application.name=shop-backend

# Giữ nguyên kết nối nội bộ (localhost) vì DB nằm chung server với app
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:shoeshop}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Khai báo Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Cấu hình JWT Security
bezkoder.app.jwtSecret=${JWT_SECRET}
bezkoder.app.jwtExpirationMs=7200000
bezkoder.app.jwtCookieName=bezkoder-jwt

spring.application.api-prefix=/api/v1

# ===================================================================
# CẤU HÌNH PAYPAL (Sửa link trả kết quả về FRONTEND nhận xử lý)
# ===================================================================
paypal.mode=sandbox
paypal.client.id=${PAYPAL_CLIENT_ID}
paypal.client.secret=${PAYPAL_CLIENT_SECRET}


paypal.url.success=${BACKEND_URL:https://shopshoes.site}${spring.application.api-prefix}/paypal/success
paypal.url.cancel=${BACKEND_URL:https://shopshoes.site}${spring.application.api-prefix}/paypal/cancel


# ===================================================================
# CẤU HÌNH VNPAY (Sửa link callback về BACKEND xử lý)
# ===================================================================
payment.vnPay.url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
payment.vnPay.tmnCode=${VNPAY_TMN_CODE}
payment.vnPay.secretKey=${VNPAY_SECRET_KEY}

payment.vnPay.returnUrl=${BACKEND_URL:https://shopshoes.site}${spring.application.api-prefix}/payment/vn-pay-callback
payment.vnPay.version=2.1.0
payment.vnPay.command=pay
payment.vnPay.orderType=other

# ===================================================================
# CONFIGURATION: SYSTEM & MULTIPART & CORS
# ===================================================================

app.frontend-url=${FRONTEND_URL:https://shopshoes.site}

# Tích hợp Gemini AI
google.gemini.api-key=${GEMINI_API_KEY}
google.gemini.model=gemini-2.0-flash

# Cấu hình SendGrid Email
send_grid.api_key=${SENDGRID_API_KEY}
send_grid.from_email=lvhafdev@gmail.com
send_grid.from_name=ShopHan

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

